name: Workflow For Azure Login By OIDC
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - feature
permissions:
  id-token: write
  contents: read
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Azure CLI Script 
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show
